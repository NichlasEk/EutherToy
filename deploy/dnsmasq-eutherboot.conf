port=0
interface=enp6s0
bind-interfaces
dhcp-no-override

# ProxyDHCP only. The existing router/DHCP server still gives clients IP, DNS,
# gateway, and lease time. This dnsmasq instance only answers PXE boot metadata.
dhcp-range=192.168.32.0,proxy,255.255.255.0

dhcp-userclass=set:ipxe,iPXE
dhcp-match=set:bios,option:client-arch,0
dhcp-match=set:efi-bc,option:client-arch,7
dhcp-match=set:efi-x86_64,option:client-arch,9

dhcp-boot=tag:ipxe,http://192.168.32.88:8080/boot.ipxe
# Some UEFI firmware accepts the ProxyDHCP offer but never fetches the boot
# file unless dnsmasq also fills in the BOOTP filename fields explicitly.
dhcp-boot=tag:!ipxe,tag:bios,ipxe.pxe
dhcp-boot=tag:!ipxe,tag:efi-bc,ipxe.efi
dhcp-boot=tag:!ipxe,tag:efi-x86_64,ipxe.efi
pxe-service=tag:bios,x86PC,"EutherBoot BIOS",ipxe.pxe
pxe-service=tag:efi-bc,BC_EFI,"EutherBoot UEFI BC",ipxe.efi
pxe-service=tag:efi-x86_64,X86-64_EFI,"EutherBoot UEFI x64",ipxe.efi

enable-tftp
tftp-root=/srv/eutherboot-tftp
log-dhcp
