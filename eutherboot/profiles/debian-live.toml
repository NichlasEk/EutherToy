[id]
name = "debian-live"
label = "Debian Live"
type = "linux-live"

[match]
filename_contains = ["debian-live", "amd64"]

[boot]
kernel = "/mounts/debian-live/live/vmlinuz"
initrd = "/mounts/debian-live/live/initrd.img"
args = [
  "boot=live",
  "components",
  "fetch=${boot-url}/mounts/debian-live/live/filesystem.squashfs"
]
